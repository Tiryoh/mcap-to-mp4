name: Bump version for next release
on:
  issues:
    types: [opened, reopened]

permissions:
  pull-requests: write
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, 'Release ') && github.event.issue.user.login == github.repository_owner
    steps:
      - name: Install git-chglog
        run: |
          sudo mkdir -p /usr/local/src
          sudo chmod 777 /usr/local/src
          cd /usr/local/src
          wget https://github.com/git-chglog/git-chglog/releases/download/v0.15.4/git-chglog_0.15.4_linux_amd64.tar.gz
          tar zxvf git-chglog*.tar.gz
          sudo ln /usr/local/src/git-chglog /bin/git-chglog
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Create release branch
        id: create-release
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git remote set-url origin https://github.com/${{ github.repository }}.git
          export VERSION=$(echo "$ISSUE_TITLE" | sed -E 's/Release v?([0-9\.]*)/\1/g')
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: '$VERSION'"
            exit 1
          fi
          export BRANCH=release/v$VERSION
          bash .github/scripts/update_changelog.sh $VERSION
          bash .github/scripts/update_version.sh $VERSION
          uv lock
          git switch -c $BRANCH
          git add .
          git commit -m "release: Release v$VERSION"
          echo release-version=$VERSION >> $GITHUB_OUTPUT
          echo created-branch=$BRANCH >> $GITHUB_OUTPUT
      - name: Sync created branch
        env:
          CREATED_BRANCH: ${{ steps.create-release.outputs.created-branch }}
        run: |
          git remote set-url origin https://github-actions:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin "$CREATED_BRANCH" > /dev/null 2>&1
      - name: Create pull-request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.create-release.outputs.release-version }}
          CREATED_BRANCH: ${{ steps.create-release.outputs.created-branch }}
        run: |
          gh pr create --title "release: v${RELEASE_VERSION}" \
            --body "close \#${{ github.event.issue.number }}" \
            --base main \
            --head "$CREATED_BRANCH" \
            --label "Type: Maintenance" \
            --assignee ${{ github.actor }}
